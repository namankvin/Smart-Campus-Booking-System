name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install root dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Install client dependencies
        run: npm install --prefix client --legacy-peer-deps --no-audit --no-fund

      # Optional: remove this if test:all is not defined in package.json
      # - name: Run all tests
      #   run: npm run test:all

      - name: Build client
        run: npm run build
