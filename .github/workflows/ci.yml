name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install root dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci --no-audit --no-fund && exit 0
            echo "Root install failed on attempt ${attempt}."
            if [ "$attempt" -eq 3 ]; then
              echo "Root install failed after 3 attempts."
              exit 1
            fi
            npm cache verify || true
            sleep 5
          done

      - name: Install client dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci --prefix client --no-audit --no-fund && exit 0
            echo "Client install failed on attempt ${attempt}."
            if [ "$attempt" -eq 3 ]; then
              echo "Client install failed after 3 attempts."
              exit 1
            fi
            npm cache verify || true
            sleep 5
          done

      - name: Run all tests
        run: npm run test:all

      - name: Build client
        run: npm run build
